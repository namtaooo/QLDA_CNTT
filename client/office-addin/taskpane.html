<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <title>AI Office Assistant</title>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" type="text/javascript"></script>
    <link rel="stylesheet" href="taskpane.css" type="text/css" />
</head>
<body>
    <div id="app">
        <header>
            <h1>AI Office Assistant</h1>
            <p id="context-info">Đang kết nối...</p>
        </header>
        <main>
            <div id="chat-history"></div>
            <div class="input-area">
                <textarea id="prompt-input" placeholder="Bạn muốn tôi giúp gì?"></textarea>
                <button id="send-btn">Gửi</button>
                <button id="action-btn">Tự động hoá</button>
            </div>
        </main>
    </div>
    <script src="taskpane.js" type="text/javascript"></script>
</body>
</html>
